app = "autoscan-agent"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
